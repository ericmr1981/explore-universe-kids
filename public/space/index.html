<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="探索宇宙 - 太阳系动态运行图，点击行星了解宇宙奥秘">
  <title>探索宇宙 | 太阳系</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="universe">
    <div class="stars"></div>

    <div class="solar-system">
      <div class="sun" data-planet="sun">
        <div class="sun-glow"></div>
      </div>

      <!-- Planets will be dynamically generated by JavaScript -->
    </div>

    <!-- Planet Info Modal -->
    <div id="planetModal" class="modal">
      <div class="modal-content">
        <button class="modal-close" id="closeModal">&times;</button>
        <div class="modal-header">
          <h2 id="planetName"></h2>
          <h3 id="planetNameEn" class="planet-name-en"></h3>
        </div>
        <div class="modal-body">
          <div class="planet-stats">
            <div class="stat">
              <span class="stat-label">半径</span>
              <span class="stat-value" id="planetRadius"></span>
            </div>
            <div class="stat">
              <span class="stat-label">距太阳</span>
              <span class="stat-value" id="planetDistance"></span>
            </div>
            <div class="stat">
              <span class="stat-label">公转周期</span>
              <span class="stat-value" id="planetOrbitalPeriod"></span>
            </div>
          </div>
          <p id="planetDescription" class="planet-description"></p>
        </div>
      </div>
    </div>

    <div class="info-hint">
      <span>🪐 点击行星查看详情</span>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
